name: portify_app
description: A Modern Personal Portfolio Builder Mobile App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.6
  provider: ^6.0.5

  # Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2

  # Media
  image_picker: ^1.0.4

  # UI Enhancements
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.0

  # QR Code
  qr_flutter: ^4.1.0

  # Sharing & Utilities
  share_plus: ^7.2.1
  url_launcher: ^6.1.14
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
